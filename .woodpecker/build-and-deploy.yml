steps:
  lint:
    image: alpine/helm:latest
    commands:
      - helm lint .

  package:
    image: alpine/helm:latest
    commands:
      - helm package .
    when:
      branch: main

  install-cm-push-helm-plugin:
    image: alpine/helm:latest
    commands:
      - helm plugin install --verify=false https://github.com/chartmuseum/helm-push
    when:
      branch: main

  add-repo:
    image: alpine/helm:latest
    environment:
      FORGEJO_USERNAME:
        from_secret: FORGEJO_USERNAME
      FORGEJO_PASSWORD:
        from_secret: FORGEJO_PASSWORD
    commands:
      - helm repo add  --username $FORGEJO_USERNAME --password $FORGEJO_PASSWORD forgejo_repo https://forgejo.sakul-flee.de/api/packages/$FORGEJO_USERNAME/helm
    when:
      branch: main

  publish:
    image: alpine/helm:latest
    commands:
      - helm cm-push ./*.tgz forgejo_repo
    when:
      branch: main

  create-release:
    image: alpine:latest
    environment:
      FORGEJO_PASSWORD:
        from_secret: FORGEJO_PASSWORD
    commands:
      - apk add --no-cache curl jq
      - |
        curl -X 'POST' "https://forgejo.sakul-flee.de/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases" \
             -H "accept: application/json" \
             -H "Authorization: Bearer $FORGEJO_PASSWORD" \
             -H "Content-Type: application/json" \
             -d "{
               \"tag_name\": \"${CI_COMMIT_TAG}\",
               \"target_commitish\": \"${CI_COMMIT_SHA}\",
               \"name\": \"Release ${CI_COMMIT_TAG}\",
               \"body\": \"Automatic release from Woodpecker CI Build #${CI_PIPELINE_NUMBER}\",
               \"draft\": false,
               \"prerelease\": false
             }"
    when:
      event: tag
      branch: main
