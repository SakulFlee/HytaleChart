when:
  branch: main
  event: [tag, push, manual]

steps:
  lint:
    image: alpine/helm:latest
    commands:
      - helm lint .
 
  publish:
    image: alpine/helm:latest    
    environment:
      FORGEJO_USERNAME:
        from_secret: FORGEJO_USERNAME
      FORGEJO_PASSWORD:
        from_secret: FORGEJO_PASSWORD
    commands:
    # 1. Install the plugin
    - helm plugin install --verify=false https://github.com/chartmuseum/helm-push

    # 2. Package the chart first (to get the .tgz file)
    - helm package .
    
    # 3. Add the repo (Exact URL from docs, no trailing slash)
    - |
      helm repo add forgejo_repo \
        https://forgejo.sakul-flee.de/api/packages/$FORGEJO_USERNAME/helm \
        --username $FORGEJO_USERNAME \
        --password $FORGEJO_PASSWORD
    
    # 4. Push the SPECIFIC file as shown in the docs
    # Using 'ls' to find the file name so we don't have to hardcode the version
    - |
      CHART_FILE=$(ls *.tgz | head -n 1)
      helm cm-push ./$CHART_FILE forgejo_repo

  create-release:
    image: alpine:latest
    environment:
      FORGEJO_PASSWORD:
        from_secret: FORGEJO_PASSWORD
    commands:
      - apk add --no-cache curl jq
      - |
        curl -X 'POST' "https://forgejo.sakul-flee.de/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases" \
             -H "accept: application/json" \
             -H "Authorization: Bearer $FORGEJO_PASSWORD" \
             -H "Content-Type: application/json" \
             -d "{
               \"tag_name\": \"${CI_COMMIT_TAG}\",
               \"target_commitish\": \"${CI_COMMIT_SHA}\",
               \"name\": \"Release ${CI_COMMIT_TAG}\",
               \"body\": \"Automatic release from Woodpecker CI Build #${CI_PIPELINE_NUMBER}\",
               \"draft\": false,
               \"prerelease\": false
             }"
    when:
      event: tag
      branch: main
