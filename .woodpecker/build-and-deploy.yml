steps:
  publish-helm:
    image: alpine/helm:latest
    environment:
      FORGEJO_USERNAME:
        from_secret: FORGEJO_USERNAME
      FORGEJO_PASSWORD:
        from_secret: FORGEJO_PASSWORD
    commands:
      # 1. Log into the Forgejo OCI registry
      - echo $FORGEJO_PASSWORD | helm registry login forgejo.sakul-flee.de --username $FORGEJO_USERNAME --password-stdin
      
      # 2. Package the chart 
      - helm package . --version ${CI_COMMIT_TAG:latest}
      
      # 3. Push to the Forgejo OCI Registry
      - helm push hytale-*.tgz oci://forgejo.sakul-flee.de/sakulflee
    when:
      event: [push, tag, manual]
      branch: main

  create-release:
    image: alpine:latest
    environment:
      FORGEJO_PASSWORD:
        from_secret: FORGEJO_PASSWORD
    commands:
      - apk add --no-cache curl jq
      - |
        curl -X 'POST' "https://forgejo.sakul-flee.de/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases" \
             -H "accept: application/json" \
             -H "Authorization: Bearer $FORGEJO_PASSWORD" \
             -H "Content-Type: application/json" \
             -d "{
               \"tag_name\": \"${CI_COMMIT_TAG}\",
               \"target_commitish\": \"${CI_COMMIT_SHA}\",
               \"name\": \"Release ${CI_COMMIT_TAG}\",
               \"body\": \"Automatic release from Woodpecker CI Build #${CI_PIPELINE_NUMBER}\",
               \"draft\": false,
               \"prerelease\": false
             }"
    when:
      event: tag
      branch: main
